[tools]
task = "3"
fd = "9.0.0"
gum = "0.13.0"
yq = "latest"
rust = "1.92"
bun = "latest"
go = "latest"
fzf = "latest"
rclone = "latest"
age = "latest"
starship = "latest"
uv = "latest"
node = "latest"
fnox = "latest"
bitwarden = "latest"
yt-dlp = "latest"

[task_config]
dir = "{{cwd}}"
includes = [
  "~/configs/bin/bin"
]

[settings]
idiomatic_version_file_enable_tools = ["node"]
experimental = true

[env]
_.path = [
  "{{cwd}}/node_modules/.bin",
]
EDITOR = "zed"
RUST_LOG = "info"
HUSKY = 0
TASK_X_REMOTE_TASKFILES=1
KEY_DATABASE_URL = { age = "" }
KEY_KEYFILE = { age = "" }
KEY_S3_ACCESS_KEY = { age = "" }
KEY_S3_SECRET_KEY = { age = "" }
RCLONE_CONFIG_CRYPT_REMOTE = { age = "" }
RCLONE_CONFIG_CRYPT_TYPE = { age = "" }
RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID = { age = "" }
RCLONE_CONFIG_STORAGE_ENDPOINT = { age = "" }
RCLONE_CONFIG_STORAGE_PROVIDER = { age = "" }
RCLONE_CONFIG_STORAGE_REGION = { age = "" }
RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY = { age = "" }
RCLONE_CONFIG_STORAGE_TYPE = { age = "" }
