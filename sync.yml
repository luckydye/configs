# Rclone sync configuration
# Define directories to sync to S3 storage
# Paths can use ~ for home directory expansion

remote: "storage:/sync"  # Your S3 remote name and bucket

# Map local directories to bucket paths
# Only directories that exist on the current system will be synced
directories:
  - local: ~/Documents
    remote: documents
  - local: ~/Pictures
    remote: pictures
  - local: ~/Music/User Library
    remote: abelton
  - local: /mnt/c/Users/tihav/Documents/Ableton/User\ Library
    remote: abelton
